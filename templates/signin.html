<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In | Bookmark Saver</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fas fa-bookmark icon-large"></i> Bookmark Saver
        </div>
        <div class="navbar-links">
            <a href="/signup" class="btn-custom btn-signup">Sign Up</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="auth-card signin-card">
            <h2>Welcome Back!</h2>
            <form method="POST" class="auth-form">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn-action btn-signin">Sign In</button>
            </form>
        </div>
    </main>
</body>
</html>
